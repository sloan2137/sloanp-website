<!DOCTYPE html>
<html>

<head>
  <style>
    @font-face {
      font-family: "boby flox";
      src: url("fonts/font/wayfarers-toy-box.ttf") format("truetype");
    }

    #main {
      background-image: url('backgrounds/eyes_index.png');
      background-attachment: fixed;
      text-align: center;
      padding: 2%;
    }

    #back {
      background-image: url('backgrounds/tre.png');
      image-rendering: pixelated;
      padding: 30px;
      grid-auto-rows: minmax(auto, auto);
      display: table;
    }

    #menu {
      width: 100%;
      line-height: 1.5vw;
      display: flex;
      background: -webkit-linear-gradient(left, #483423, #7c5a3c);
      border: solid;
      border-right-color: currentcolor;
      border-left-color: currentcolor;
      border-color: #5d3d15;
      border-bottom-color: #424242;
      border-right-color: #424242;
      padding: 0.25%;
    }

    .clicky_clack {
      font-family: "MS Sans Serif", Tahoma, Verdana, sans-serif;
      font-size: 1vw;
      text-decoration: none;
      text-wrap: nowrap;

      padding-left: 10px;
      padding-right: 10px;
      margin-right: 10px;

      border: solid;
      border-top-width: medium;
      border-top-color: currentcolor;
      border-right-width: medium;
      border-right-color: currentcolor;
      border-bottom-width: medium;
      border-bottom-color: currentcolor;
      border-left-width: medium;
      border-left-color: currentcolor;
      border-width: 0.2vw;
      border-color: #fff;
      border-right-color: rgb(255, 255, 255);
      border-bottom-color: rgb(255, 255, 255);
      border-bottom-color: #424242;
      border-right-color: #424242;
      background: #9d8d79;
      color: black;
    }

    .clicky_clack_bar {
      font-family: "MS Sans Serif", Tahoma, Verdana, sans-serif;
      
      padding-left: 2px;
      padding-right: 2px;
      margin-right: 2px;

      border: solid;
      border-top-width: medium;
      border-top-color: currentcolor;
      border-right-width: medium;
      border-right-color: currentcolor;
      border-bottom-width: medium;
      border-bottom-color: currentcolor;
      border-left-width: medium;
      border-left-color: currentcolor;
      border-width: 0.1vw;
      border-color: #fff;
      border-right-color: rgb(255, 255, 255);
      border-bottom-color: rgb(255, 255, 255);
      border-bottom-color: #424242;
      border-right-color: #424242;
      background: #9d8d79;
      color: black;
    }

    .cool_moves {
      display: flex;
      width: 850%;
      left: 0;
      position: absolute;
      animation: track-right 17s linear infinite;
    }

    .track {
      display: flex;
      width: 50%;
      justify-content: space-around;
    }

    .marquee {
      margin-top: 0.5%;
      margin-bottom: 0.5%;
      position: relative;
      width: 100%;
      height: 2vw;
      overflow: hidden;
    }

    .window {
      background: #9d8d79;
      box-shadow: inset -1px -1px #0a0a0a,inset 1px 1px #dfdfdf,inset -2px -2px grey,inset 2px 2px #fff;
      padding: 3px;
    }

    .title-bar {
      align-items: center;
      background: linear-gradient(90deg, #483423, #7c5a3c);
      display: flex;
      justify-content: space-between;
      padding: 3px 2px 3px 3px;
    }

    .title-bar-text{
      font-family: 'boby flox';
      font-size: 11px;
    }
    .title-bar-controls{
      display: flex;
    }

    .leftbar {
      float: left;
      width: 23%;
      border-radius: 3%;
      margin-right: 2%;
  }
    .center {
      float: left;
      width: 50%;
      border-radius: 3%;
      margin-right: 2%;
    }
    .rightbar {
      float: left;
      width: 20%;
      height: 100%;
      background-color: #7c5a3c;
      border: 1px solid #916f41;
      border-radius: 3%;
      opacity: 0.7;
    }

    @keyframes track-right {
      0% {
        left: -425%;
      }

      100% {
        left: 0%;
      }
    }
  </style>
</head>
